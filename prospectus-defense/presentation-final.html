.small-text[**The Puzzle:**&lt;br&gt;]
--
.verysmall-text[• Partisan gaps and misperceptions in factual beliefs have drawn enormous scholarly attention.&lt;br&gt;]
--
.verysmall-text[• Yet recent work suggests that they may be less concerning than initially feared: (i) partisan gaps **shrink under incentives** and (ii) misperceptions are **weakly held and responsive to corrections**.&lt;br&gt;]
--
.highlight[.verysmall-text[• So, should we dismiss these reported beliefs as inconsequential? Or do they matter in ways the literature hasn't looked for?]&lt;br&gt;&lt;br&gt;]
--
.small-text[**The Argument:**&lt;br&gt;]
--
.verysmall-text[• Epistemic properties (e.g., stability) alone don't capture whether and how these beliefs matter.&lt;br&gt;]
--
.verysmall-text[• These beliefs are .highlight[reflective] *(context-dependent, compartmentalized)* and serve .highlight[non-epistemic functions] *(justifications for political commitments)*&lt;br&gt;]
--
.verysmall-text[&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;◦ *Integrates large literature on evolutionary psychology and philosophy of mind*&lt;br&gt;]
--
.verysmall-text[&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;◦ *Theory generates testable expectations even where properties can't be tested directly*&lt;br&gt;&lt;br&gt;]
--
.small-text[**The Empirical Tests:**&lt;br&gt;]
--
.verysmall-text[• **Do beliefs vary across elicitation contexts** (political survey / incentivized / consumer survey)? **Which beliefs best correspond to which attitudes?** *(Paper 1, Ch. 1)*&lt;br&gt;]
--
.verysmall-text[&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;◦ *Speaks to: .highlight[congenial inference] vs. cheerleading; beliefs as .highlight[sincere but context-dependent/compartmentalized]*&lt;br&gt;]
--
.verysmall-text[• **Do factual claims arise spontaneously when people justify their political attitudes? How does the anticipation of social scrutiny affect?** *(Paper 1, Ch. 2)*&lt;br&gt;]
--
.verysmall-text[&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;◦ *Speaks to: survey-measured beliefs as .highlight[cheap talk] or reflections of .highlight[real-world political reasoning]; which factual claims can be credibly argued shaping .highlight[political discourse]*&lt;br&gt;]
--
.verysmall-text[• **Do people reinterpret corrected facts in predisposition-consistent ways?** *(Paper 2, Ch. 3)*&lt;br&gt;]
--
.verysmall-text[&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;◦ *Speaks to: disconnect between attitudes and beliefs: why corrections that work epistemically may not work politically*&lt;br&gt;]
